<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 720" width="100%">
  <defs>
    <filter id="shadow-standard" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="3" dy="3" stdDeviation="0" flood-color="#2B2B2B" flood-opacity="0.15"/>
    </filter>
    <filter id="shadow-elevated" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="5" dy="5" stdDeviation="0" flood-color="#2B2B2B" flood-opacity="0.2"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8C8C8C"/>
    </marker>
    <marker id="arrowhead-gold" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#D4A843"/>
    </marker>
    <style>
      @media (prefers-color-scheme: dark) {
        .bg-ivory { fill: #1A1A2E; }
        .text-navy { fill: #F5F0E8; }
        .text-charcoal { fill: #E0E0E0; }
        .text-muted { fill: #8C8C8C; }
        .border-navy { stroke: #4A7C9B; }
        .card-fill { fill: #2B2B3D; }
        .header-fill { fill: #0D1B2A; }
      }
    </style>
  </defs>

  <!-- Background -->
  <rect class="bg-ivory" width="960" height="720" fill="#F5F0E8"/>

  <!-- Title Bar -->
  <rect class="header-fill" x="0" y="0" width="960" height="56" fill="#1B3A5C"/>
  <text x="480" y="36" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="24" fill="#F5F0E8" text-anchor="middle" letter-spacing="0.05em">ENGRAM — MCP MEMORY SERVER ARCHITECTURE</text>

  <!-- Section: AI Clients -->
  <text x="40" y="86" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#8C8C8C" letter-spacing="0.08em">AI CLIENTS</text>
  <line x1="40" y1="92" x2="620" y2="92" stroke="#1B3A5C" stroke-width="1" opacity="0.3"/>

  <!-- Client pills -->
  <g filter="url(#shadow-standard)">
    <rect x="50" y="102" width="120" height="34" fill="#4A7C9B" rx="2"/>
    <text x="110" y="124" text-anchor="middle" fill="#FFFFFF" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="600">Cursor</text>
  </g>
  <g filter="url(#shadow-standard)">
    <rect x="186" y="102" width="120" height="34" fill="#2D6A4F" rx="2"/>
    <text x="246" y="124" text-anchor="middle" fill="#FFFFFF" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="600">VS Code</text>
  </g>
  <g filter="url(#shadow-standard)">
    <rect x="322" y="102" width="120" height="34" fill="#D4A843" rx="2"/>
    <text x="382" y="124" text-anchor="middle" fill="#FFFFFF" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="600">Claude Code</text>
  </g>
  <g filter="url(#shadow-standard)">
    <rect x="458" y="102" width="120" height="34" fill="#C23B22" rx="2"/>
    <text x="518" y="124" text-anchor="middle" fill="#FFFFFF" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="600">Windsurf</text>
  </g>

  <!-- Connecting lines down -->
  <g stroke="#8C8C8C" stroke-width="1.5" opacity="0.4">
    <line x1="110" y1="136" x2="110" y2="155"/>
    <line x1="246" y1="136" x2="246" y2="155"/>
    <line x1="382" y1="136" x2="382" y2="155"/>
    <line x1="518" y1="136" x2="518" y2="155"/>
  </g>

  <!-- Protocol Bar -->
  <rect x="50" y="155" width="528" height="28" fill="#1B3A5C" rx="2"/>
  <text x="314" y="173" text-anchor="middle" fill="#F5F0E8" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="600" letter-spacing="0.05em">MCP PROTOCOL — STDIO | SSE</text>

  <!-- Arrow down -->
  <line x1="314" y1="183" x2="314" y2="210" stroke="#D4A843" stroke-width="1.5" marker-end="url(#arrowhead-gold)"/>

  <!-- Section: Core Server -->
  <text x="40" y="220" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#8C8C8C" letter-spacing="0.08em">CORE SERVER</text>
  <line x1="40" y1="226" x2="620" y2="226" stroke="#1B3A5C" stroke-width="1" opacity="0.3"/>

  <!-- Main server box -->
  <g filter="url(#shadow-elevated)">
    <rect class="card-fill" x="50" y="236" width="528" height="140" fill="#FFFFFF" stroke="#D4A843" stroke-width="3" rx="4"/>
    <rect x="50" y="236" width="528" height="32" fill="#1B3A5C" rx="4"/>
    <rect x="50" y="264" width="528" height="4" fill="#1B3A5C"/>
    <text x="314" y="258" text-anchor="middle" fill="#F5F0E8" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="16" letter-spacing="0.03em">Engram MCP Server</text>
  </g>

  <!-- Tool labels row 1 -->
  <g font-family="'Helvetica Neue', Arial, sans-serif" font-size="10">
    <rect x="68" y="282" width="66" height="24" fill="none" stroke="#4A7C9B" stroke-width="1" rx="2"/>
    <text x="101" y="298" text-anchor="middle" fill="#1B3A5C" font-weight="600">store</text>

    <rect x="146" y="282" width="66" height="24" fill="none" stroke="#4A7C9B" stroke-width="1" rx="2"/>
    <text x="179" y="298" text-anchor="middle" fill="#1B3A5C" font-weight="600">recall</text>

    <rect x="224" y="282" width="72" height="24" fill="none" stroke="#2D6A4F" stroke-width="1" rx="2"/>
    <text x="260" y="298" text-anchor="middle" fill="#1B3A5C" font-weight="600">connect</text>

    <rect x="308" y="282" width="56" height="24" fill="none" stroke="#4A7C9B" stroke-width="1" rx="2"/>
    <text x="336" y="298" text-anchor="middle" fill="#1B3A5C" font-weight="600">list</text>

    <rect x="376" y="282" width="68" height="24" fill="none" stroke="#D4A843" stroke-width="1" rx="2"/>
    <text x="410" y="298" text-anchor="middle" fill="#1B3A5C" font-weight="600">correct</text>

    <rect x="456" y="282" width="66" height="24" fill="none" stroke="#C23B22" stroke-width="1" rx="2"/>
    <text x="489" y="298" text-anchor="middle" fill="#1B3A5C" font-weight="600">forget</text>
  </g>

  <!-- Tool labels row 2 -->
  <g font-family="'Helvetica Neue', Arial, sans-serif" font-size="10">
    <rect x="118" y="316" width="66" height="24" fill="none" stroke="#4A7C9B" stroke-width="1" rx="2"/>
    <text x="151" y="332" text-anchor="middle" fill="#1B3A5C" font-weight="600">status</text>

    <rect x="198" y="316" width="78" height="24" fill="none" stroke="#2D6A4F" stroke-width="1" rx="2"/>
    <text x="237" y="332" text-anchor="middle" fill="#1B3A5C" font-weight="600">feedback</text>

    <rect x="290" y="316" width="96" height="24" fill="none" stroke="#D4A843" stroke-width="1" rx="2"/>
    <text x="338" y="332" text-anchor="middle" fill="#1B3A5C" font-weight="600">consolidate</text>

    <rect x="400" y="316" width="92" height="24" fill="none" stroke="#2D6A4F" stroke-width="1" rx="2"/>
    <text x="446" y="332" text-anchor="middle" fill="#1B3A5C" font-weight="600">onboarding</text>
  </g>

  <!-- Connecting lines to data layer -->
  <g stroke="#8C8C8C" stroke-width="1.5" opacity="0.4">
    <line x1="150" y1="376" x2="138" y2="420" marker-end="url(#arrowhead)"/>
    <line x1="260" y1="376" x2="270" y2="420" marker-end="url(#arrowhead)"/>
    <line x1="370" y1="376" x2="400" y2="420" marker-end="url(#arrowhead)"/>
    <line x1="470" y1="376" x2="500" y2="420" marker-end="url(#arrowhead)"/>
  </g>

  <!-- Section: Data Layer -->
  <text x="40" y="412" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#8C8C8C" letter-spacing="0.08em">DATA LAYER</text>
  <line x1="40" y1="418" x2="620" y2="418" stroke="#1B3A5C" stroke-width="1" opacity="0.3"/>

  <!-- Component 1: Chunker -->
  <g filter="url(#shadow-standard)">
    <rect class="card-fill" x="40" y="430" width="125" height="80" fill="#FFFFFF" stroke="#2D6A4F" stroke-width="2" rx="4"/>
    <text x="102" y="455" text-anchor="middle" fill="#1B3A5C" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="13">Chunker</text>
    <line x1="56" y1="462" x2="148" y2="462" stroke="#8C8C8C" stroke-width="0.5" opacity="0.4"/>
    <text x="102" y="478" text-anchor="middle" fill="#2B2B2B" font-family="'Helvetica Neue', Arial, sans-serif" font-size="9.5">Splits text into</text>
    <text x="102" y="492" text-anchor="middle" fill="#2B2B2B" font-family="'Helvetica Neue', Arial, sans-serif" font-size="9.5">semantic chunks</text>
  </g>

  <!-- Component 2: Embeddings -->
  <g filter="url(#shadow-standard)">
    <rect class="card-fill" x="180" y="430" width="125" height="80" fill="#FFFFFF" stroke="#4A7C9B" stroke-width="2" rx="4"/>
    <text x="242" y="455" text-anchor="middle" fill="#1B3A5C" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="13">Embeddings</text>
    <line x1="196" y1="462" x2="288" y2="462" stroke="#8C8C8C" stroke-width="0.5" opacity="0.4"/>
    <text x="242" y="478" text-anchor="middle" fill="#2B2B2B" font-family="'Helvetica Neue', Arial, sans-serif" font-size="9.5">OpenAI · Ollama</text>
    <text x="242" y="492" text-anchor="middle" fill="#8C8C8C" font-family="'Helvetica Neue', Arial, sans-serif" font-size="9.5" font-style="italic">None (disabled)</text>
  </g>

  <!-- Component 3: Search Engine -->
  <g filter="url(#shadow-standard)">
    <rect class="card-fill" x="320" y="430" width="135" height="80" fill="#FFFFFF" stroke="#D4A843" stroke-width="2" rx="4"/>
    <text x="387" y="455" text-anchor="middle" fill="#1B3A5C" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="13">Search Engine</text>
    <line x1="336" y1="462" x2="438" y2="462" stroke="#8C8C8C" stroke-width="0.5" opacity="0.4"/>
    <text x="387" y="478" text-anchor="middle" fill="#2B2B2B" font-family="'Helvetica Neue', Arial, sans-serif" font-size="9.5">Hybrid scoring</text>
    <text x="387" y="492" text-anchor="middle" fill="#D4A843" font-family="'Helvetica Neue', Arial, sans-serif" font-size="9" font-weight="600">BM25 · Vector · Graph · Recency</text>
  </g>

  <!-- Component 4: Database -->
  <g filter="url(#shadow-standard)">
    <rect class="card-fill" x="470" y="430" width="125" height="80" fill="#FFFFFF" stroke="#C23B22" stroke-width="2" rx="4"/>
    <text x="532" y="455" text-anchor="middle" fill="#1B3A5C" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="13">Database</text>
    <line x1="486" y1="462" x2="578" y2="462" stroke="#8C8C8C" stroke-width="0.5" opacity="0.4"/>
    <text x="532" y="478" text-anchor="middle" fill="#2B2B2B" font-family="'Helvetica Neue', Arial, sans-serif" font-size="9.5">SQLite (local)</text>
    <text x="532" y="492" text-anchor="middle" fill="#2B2B2B" font-family="'Helvetica Neue', Arial, sans-serif" font-size="9.5">PostgreSQL (Docker)</text>
  </g>

  <!-- Section: Docker Deployment (right column) -->
  <text x="650" y="86" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#8C8C8C" letter-spacing="0.08em">DOCKER DEPLOYMENT</text>
  <line x1="650" y1="92" x2="920" y2="92" stroke="#1B3A5C" stroke-width="1" opacity="0.3"/>

  <!-- Docker container outline -->
  <rect x="640" y="102" width="280" height="408" fill="none" stroke="#2D6A4F" stroke-width="2" rx="4" stroke-dasharray="6,4"/>

  <!-- Docker command badge -->
  <rect x="660" y="115" width="240" height="24" fill="#1B3A5C" rx="2"/>
  <text x="780" y="131" text-anchor="middle" fill="#2D6A4F" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="600" letter-spacing="0.03em">docker compose up -d</text>

  <!-- Chainguard badge -->
  <g transform="translate(680, 155)">
    <path d="M12,2 L22,7 L22,13 C22,19 18,24 12,26 C6,24 2,19 2,13 L2,7 Z" fill="none" stroke="#2D6A4F" stroke-width="1.5"/>
    <polyline points="8,13 11,16 17,9" fill="none" stroke="#2D6A4F" stroke-width="1.5"/>
    <text x="30" y="18" fill="#2D6A4F" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="600">Chainguard Hardened</text>
  </g>

  <!-- Container 1: Engram -->
  <g filter="url(#shadow-standard)">
    <rect class="card-fill" x="660" y="195" width="240" height="110" fill="#FFFFFF" stroke="#2D6A4F" stroke-width="2" rx="4"/>
    <rect x="660" y="195" width="240" height="28" fill="#2D6A4F" rx="4"/>
    <rect x="660" y="219" width="240" height="4" fill="#2D6A4F"/>
    <text x="780" y="215" text-anchor="middle" fill="#F5F0E8" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="600" font-size="12">Engram Container</text>
    <text x="676" y="244" fill="#8C8C8C" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10">FROM</text>
    <text x="710" y="244" fill="#4A7C9B" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10">cgr.dev/chainguard/</text>
    <text x="686" y="260" fill="#4A7C9B" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10">python:latest</text>
    <text x="676" y="284" fill="#8C8C8C" font-family="'Helvetica Neue', Arial, sans-serif" font-size="9">Distroless · Non-root · SBOM included</text>
  </g>

  <!-- Arrow -->
  <line x1="780" y1="305" x2="780" y2="325" stroke="#8C8C8C" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="800" y="318" fill="#8C8C8C" font-family="'Helvetica Neue', Arial, sans-serif" font-size="8">depends_on</text>

  <!-- Container 2: PostgreSQL -->
  <g filter="url(#shadow-standard)">
    <rect class="card-fill" x="660" y="330" width="240" height="110" fill="#FFFFFF" stroke="#4A7C9B" stroke-width="2" rx="4"/>
    <rect x="660" y="330" width="240" height="28" fill="#4A7C9B" rx="4"/>
    <rect x="660" y="354" width="240" height="4" fill="#4A7C9B"/>
    <text x="780" y="350" text-anchor="middle" fill="#F5F0E8" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="600" font-size="12">PostgreSQL Sidecar</text>
    <text x="676" y="379" fill="#8C8C8C" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10">FROM</text>
    <text x="710" y="379" fill="#4A7C9B" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10">cgr.dev/chainguard/</text>
    <text x="686" y="395" fill="#4A7C9B" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10">postgres:latest</text>
    <text x="676" y="419" fill="#8C8C8C" font-family="'Helvetica Neue', Arial, sans-serif" font-size="9">pgvector extension · Replaces SQLite</text>
  </g>

  <!-- Caddy note -->
  <g filter="url(#shadow-standard)">
    <rect class="card-fill" x="660" y="455" width="240" height="48" fill="#FFFFFF" stroke="#D4A843" stroke-width="1" rx="4"/>
    <text x="780" y="476" text-anchor="middle" fill="#D4A843" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="600">Caddy (optional TLS)</text>
    <text x="780" y="492" text-anchor="middle" fill="#8C8C8C" font-family="'Helvetica Neue', Arial, sans-serif" font-size="9">cgr.dev/chainguard/caddy · Auto HTTPS</text>
  </g>

  <!-- Data Flow Section -->
  <text x="40" y="545" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#8C8C8C" letter-spacing="0.08em">DATA FLOW</text>
  <line x1="40" y1="551" x2="920" y2="551" stroke="#1B3A5C" stroke-width="1" opacity="0.3"/>

  <!-- Store flow -->
  <g transform="translate(50, 565)">
    <rect x="0" y="0" width="70" height="24" fill="none" stroke="#4A7C9B" stroke-width="1" rx="2"/>
    <text x="35" y="16" text-anchor="middle" fill="#1B3A5C" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="600">store()</text>

    <line x1="70" y1="12" x2="92" y2="12" stroke="#8C8C8C" stroke-width="1.5" marker-end="url(#arrowhead)"/>

    <rect x="95" y="0" width="70" height="24" fill="none" stroke="#2D6A4F" stroke-width="1" rx="2"/>
    <text x="130" y="16" text-anchor="middle" fill="#1B3A5C" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="600">chunk</text>

    <line x1="165" y1="12" x2="187" y2="12" stroke="#8C8C8C" stroke-width="1.5" marker-end="url(#arrowhead)"/>

    <rect x="190" y="0" width="70" height="24" fill="none" stroke="#4A7C9B" stroke-width="1" rx="2"/>
    <text x="225" y="16" text-anchor="middle" fill="#1B3A5C" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="600">embed</text>

    <line x1="260" y1="12" x2="282" y2="12" stroke="#8C8C8C" stroke-width="1.5" marker-end="url(#arrowhead)"/>

    <rect x="285" y="0" width="70" height="24" fill="none" stroke="#C23B22" stroke-width="1" rx="2"/>
    <text x="320" y="16" text-anchor="middle" fill="#1B3A5C" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="600">persist</text>
  </g>

  <!-- Recall flow -->
  <g transform="translate(50, 600)">
    <rect x="0" y="0" width="72" height="24" fill="none" stroke="#D4A843" stroke-width="1" rx="2"/>
    <text x="36" y="16" text-anchor="middle" fill="#1B3A5C" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="600">recall()</text>

    <line x1="72" y1="12" x2="94" y2="12" stroke="#8C8C8C" stroke-width="1.5" marker-end="url(#arrowhead)"/>

    <rect x="95" y="0" width="70" height="24" fill="none" stroke="#D4A843" stroke-width="1" rx="2"/>
    <text x="130" y="16" text-anchor="middle" fill="#1B3A5C" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="600">search</text>

    <line x1="165" y1="12" x2="187" y2="12" stroke="#8C8C8C" stroke-width="1.5" marker-end="url(#arrowhead)"/>

    <rect x="190" y="0" width="70" height="24" fill="none" stroke="#D4A843" stroke-width="1" rx="2"/>
    <text x="225" y="16" text-anchor="middle" fill="#1B3A5C" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="600">rank</text>

    <line x1="260" y1="12" x2="282" y2="12" stroke="#8C8C8C" stroke-width="1.5" marker-end="url(#arrowhead)"/>

    <rect x="285" y="0" width="70" height="24" fill="none" stroke="#2D6A4F" stroke-width="1" rx="2"/>
    <text x="320" y="16" text-anchor="middle" fill="#1B3A5C" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="600">return</text>
  </g>

  <!-- Legend -->
  <g transform="translate(500, 565)">
    <text x="0" y="12" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#8C8C8C" letter-spacing="0.08em">LEGEND:</text>
    <rect x="70" y="2" width="14" height="14" fill="none" stroke="#4A7C9B" stroke-width="2" rx="2"/>
    <text x="90" y="13" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#2B2B2B">MCP Tools</text>
    <rect x="150" y="2" width="14" height="14" fill="none" stroke="#2D6A4F" stroke-width="2" rx="2"/>
    <text x="170" y="13" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#2B2B2B">Processing</text>
    <rect x="240" y="2" width="14" height="14" fill="none" stroke="#D4A843" stroke-width="2" rx="2"/>
    <text x="260" y="13" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#2B2B2B">Search</text>
    <rect x="310" y="2" width="14" height="14" fill="none" stroke="#C23B22" stroke-width="2" rx="2"/>
    <text x="330" y="13" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#2B2B2B">Storage</text>
  </g>

  <!-- Footer -->
  <line x1="40" y1="660" x2="920" y2="660" stroke="#1B3A5C" stroke-width="1" opacity="0.3"/>
  <text x="480" y="680" text-anchor="middle" fill="#8C8C8C" font-family="'Helvetica Neue', Arial, sans-serif" font-size="9" letter-spacing="0.08em">ENGRAM — ARCHITECTURE — SIMMONS &amp; PARTNERS 2026</text>
  <text x="480" y="700" text-anchor="middle" fill="#8C8C8C" font-family="'Helvetica Neue', Arial, sans-serif" font-size="8">Architecture by Peter Simmons · Original by shugav</text>
</svg>
