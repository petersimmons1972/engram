<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 350" width="900" height="350">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1419"/>
      <stop offset="100%" stop-color="#141b22"/>
    </linearGradient>

    <!-- Lane gradients -->
    <linearGradient id="laneBlue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="laneGreen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="laneAmber" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="laneRose" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f43f5e" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#f43f5e" stop-opacity="0.05"/>
    </linearGradient>

    <!-- Merge gradient -->
    <linearGradient id="mergeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e2832"/>
      <stop offset="100%" stop-color="#182028"/>
    </linearGradient>

    <!-- Multiplier gradient -->
    <linearGradient id="multGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1f2e"/>
      <stop offset="100%" stop-color="#151a26"/>
    </linearGradient>

    <!-- Glow filters -->
    <filter id="glowBlue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#3b82f6" flood-opacity="0.3"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="softShadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.3"/>
    </filter>

    <!-- Arrow markers -->
    <marker id="arrowWhite" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#475569" stroke-width="1.2"/>
    </marker>
    <marker id="arrowMerge" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#94a3b8" stroke-width="1.2"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="350" fill="url(#bgGrad)"/>

  <!-- Subtle grid -->
  <g opacity="0.03">
    <line x1="50" y1="0" x2="50" y2="350" stroke="#fff" stroke-width="0.5"/>
    <line x1="150" y1="0" x2="150" y2="350" stroke="#fff" stroke-width="0.5"/>
    <line x1="250" y1="0" x2="250" y2="350" stroke="#fff" stroke-width="0.5"/>
    <line x1="350" y1="0" x2="350" y2="350" stroke="#fff" stroke-width="0.5"/>
    <line x1="450" y1="0" x2="450" y2="350" stroke="#fff" stroke-width="0.5"/>
    <line x1="550" y1="0" x2="550" y2="350" stroke="#fff" stroke-width="0.5"/>
    <line x1="650" y1="0" x2="650" y2="350" stroke="#fff" stroke-width="0.5"/>
    <line x1="750" y1="0" x2="750" y2="350" stroke="#fff" stroke-width="0.5"/>
    <line x1="850" y1="0" x2="850" y2="350" stroke="#fff" stroke-width="0.5"/>
  </g>

  <!-- ═══════════ TITLE ═══════════ -->
  <text x="450" y="28" text-anchor="middle" fill="#e2e8f0" font-family="'SF Pro Display','Inter','Segoe UI',system-ui,sans-serif" font-size="16" font-weight="700" letter-spacing="0.5">How Recall Works — Four-Layer Scoring</text>
  <line x1="170" y1="35" x2="730" y2="35" stroke="#1e293b" stroke-width="1"/>

  <!-- ═══════════ QUERY INPUT (left) ═══════════ -->
  <g filter="url(#softShadow)">
    <rect x="20" y="68" width="72" height="172" rx="10" fill="#1a2740" stroke="#3b82f6" stroke-width="1.2" stroke-opacity="0.6"/>
    <text x="56" y="140" text-anchor="middle" fill="#60a5fa" font-family="'SF Pro Text','Inter','Segoe UI',system-ui,sans-serif" font-size="11" font-weight="600" transform="rotate(-90 56 140)">QUERY</text>
    <text x="56" y="162" text-anchor="middle" fill="#475569" font-family="'SF Mono','JetBrains Mono','Cascadia Code',monospace" font-size="8" transform="rotate(-90 56 162)">recall()</text>
  </g>

  <!-- Flow arrows from query to lanes -->
  <g stroke="#475569" stroke-width="1" opacity="0.5">
    <line x1="92" y1="100" x2="110" y2="100"/>
    <line x1="92" y1="140" x2="110" y2="140"/>
    <line x1="92" y1="180" x2="110" y2="180"/>
    <line x1="92" y1="220" x2="110" y2="220"/>
  </g>

  <!-- ═══════════ FOUR SCORING LANES ═══════════ -->

  <!-- Lane 1: Vector / Semantic (blue, 45%) -->
  <g filter="url(#softShadow)">
    <rect x="110" y="80" width="340" height="38" rx="6" fill="url(#laneBlue)" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.5"/>
    <!-- Weight bar fill -->
    <rect x="112" y="82" width="152" height="34" rx="5" fill="#3b82f6" opacity="0.12"/>
    <!-- Label -->
    <text x="125" y="96" fill="#60a5fa" font-family="'SF Pro Text','Inter','Segoe UI',system-ui,sans-serif" font-size="11" font-weight="700">Vector / Semantic</text>
    <text x="125" y="111" fill="#475569" font-family="'SF Pro Text','Inter','Segoe UI',system-ui,sans-serif" font-size="9">Meaning similarity via embeddings</text>
    <!-- Weight badge -->
    <rect x="394" y="88" width="46" height="22" rx="11" fill="#3b82f6" opacity="0.25"/>
    <text x="417" y="103" text-anchor="middle" fill="#60a5fa" font-family="'SF Mono','JetBrains Mono','Cascadia Code',monospace" font-size="11" font-weight="700">45%</text>
  </g>

  <!-- Lane 2: BM25 / Keyword (green, 25%) -->
  <g filter="url(#softShadow)">
    <rect x="110" y="122" width="340" height="38" rx="6" fill="url(#laneGreen)" stroke="#10b981" stroke-width="1" stroke-opacity="0.5"/>
    <rect x="112" y="124" width="84" height="34" rx="5" fill="#10b981" opacity="0.12"/>
    <text x="125" y="138" fill="#34d399" font-family="'SF Pro Text','Inter','Segoe UI',system-ui,sans-serif" font-size="11" font-weight="700">BM25 / Keyword</text>
    <text x="125" y="153" fill="#475569" font-family="'SF Pro Text','Inter','Segoe UI',system-ui,sans-serif" font-size="9">Exact term matching via FTS5</text>
    <rect x="394" y="130" width="46" height="22" rx="11" fill="#10b981" opacity="0.25"/>
    <text x="417" y="145" text-anchor="middle" fill="#34d399" font-family="'SF Mono','JetBrains Mono','Cascadia Code',monospace" font-size="11" font-weight="700">25%</text>
  </g>

  <!-- Lane 3: Recency (amber, 15%) -->
  <g filter="url(#softShadow)">
    <rect x="110" y="164" width="340" height="38" rx="6" fill="url(#laneAmber)" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.5"/>
    <rect x="112" y="166" width="50" height="34" rx="5" fill="#f59e0b" opacity="0.12"/>
    <text x="125" y="180" fill="#fbbf24" font-family="'SF Pro Text','Inter','Segoe UI',system-ui,sans-serif" font-size="11" font-weight="700">Recency</text>
    <text x="125" y="195" fill="#475569" font-family="'SF Pro Text','Inter','Segoe UI',system-ui,sans-serif" font-size="9">Exponential decay from last access</text>
    <rect x="394" y="172" width="46" height="22" rx="11" fill="#f59e0b" opacity="0.25"/>
    <text x="417" y="187" text-anchor="middle" fill="#fbbf24" font-family="'SF Mono','JetBrains Mono','Cascadia Code',monospace" font-size="11" font-weight="700">15%</text>
  </g>

  <!-- Lane 4: Graph (rose, 15%) -->
  <g filter="url(#softShadow)">
    <rect x="110" y="206" width="340" height="38" rx="6" fill="url(#laneRose)" stroke="#f43f5e" stroke-width="1" stroke-opacity="0.5"/>
    <rect x="112" y="208" width="50" height="34" rx="5" fill="#f43f5e" opacity="0.12"/>
    <text x="125" y="222" fill="#fb7185" font-family="'SF Pro Text','Inter','Segoe UI',system-ui,sans-serif" font-size="11" font-weight="700">Graph</text>
    <text x="125" y="237" fill="#475569" font-family="'SF Pro Text','Inter','Segoe UI',system-ui,sans-serif" font-size="9">Connected memory boost</text>
    <rect x="394" y="214" width="46" height="22" rx="11" fill="#f43f5e" opacity="0.25"/>
    <text x="417" y="229" text-anchor="middle" fill="#fb7185" font-family="'SF Mono','JetBrains Mono','Cascadia Code',monospace" font-size="11" font-weight="700">15%</text>
  </g>

  <!-- ═══════════ MERGE ARROWS ═══════════ -->
  <g stroke="#94a3b8" stroke-width="1" opacity="0.4">
    <path d="M450,99 L475,99 Q490,99 490,114 L490,148" fill="none"/>
    <path d="M450,141 L475,141 Q490,141 490,148" fill="none"/>
    <path d="M450,183 L475,183 Q490,183 490,165" fill="none"/>
    <path d="M450,225 L475,225 Q490,225 490,200 L490,165" fill="none"/>
  </g>

  <!-- ═══════════ COMPOSITE SCORE BOX ═══════════ -->
  <g filter="url(#shadow)">
    <rect x="480" y="68" width="120" height="172" rx="10" fill="url(#mergeGrad)" stroke="#94a3b8" stroke-width="1" stroke-opacity="0.4"/>
    <text x="540" y="92" text-anchor="middle" fill="#e2e8f0" font-family="'SF Pro Text','Inter','Segoe UI',system-ui,sans-serif" font-size="11" font-weight="700">Composite</text>
    <line x1="495" y1="100" x2="585" y2="100" stroke="#2a3a50" stroke-width="0.8"/>

    <!-- Mini formula -->
    <g font-family="'SF Mono','JetBrains Mono','Cascadia Code',monospace" font-size="8.5">
      <text x="498" y="118" fill="#60a5fa">vec</text>
      <text x="520" y="118" fill="#475569">× 0.45</text>
      <text x="498" y="134" fill="#34d399">bm25</text>
      <text x="525" y="134" fill="#475569">× 0.25</text>
      <text x="498" y="150" fill="#fbbf24">rec</text>
      <text x="520" y="150" fill="#475569">× 0.15</text>
      <text x="498" y="166" fill="#fb7185">grph</text>
      <text x="525" y="166" fill="#475569">× 0.15</text>
    </g>

    <line x1="495" y1="176" x2="585" y2="176" stroke="#2a3a50" stroke-width="0.8"/>

    <!-- Multiply symbol -->
    <text x="540" y="196" text-anchor="middle" fill="#94a3b8" font-family="'SF Mono','JetBrains Mono','Cascadia Code',monospace" font-size="10">× importance</text>
    <text x="540" y="212" text-anchor="middle" fill="#e2e8f0" font-family="'SF Pro Text','Inter','Segoe UI',system-ui,sans-serif" font-size="10" font-weight="600">= final score</text>

    <!-- Connector dot -->
    <circle cx="540" cy="154" r="3" fill="#94a3b8" opacity="0.5"/>
  </g>

  <!-- Arrow from composite to multiplier -->
  <line x1="600" y1="154" x2="625" y2="154" stroke="#94a3b8" stroke-width="1.2" opacity="0.5" marker-end="url(#arrowMerge)"/>

  <!-- ═══════════ IMPORTANCE MULTIPLIER (right) ═══════════ -->
  <g filter="url(#shadow)">
    <rect x="630" y="52" width="250" height="196" rx="12" fill="url(#multGrad)" stroke="#475569" stroke-width="1" stroke-opacity="0.5"/>

    <!-- Header -->
    <text x="755" y="76" text-anchor="middle" fill="#e2e8f0" font-family="'SF Pro Display','Inter','Segoe UI',system-ui,sans-serif" font-size="12" font-weight="700">Importance Multiplier</text>
    <line x1="648" y1="84" x2="862" y2="84" stroke="#2a3a50" stroke-width="0.8"/>

    <!-- Scale items -->
    <g font-family="'SF Pro Text','Inter','Segoe UI',system-ui,sans-serif" font-size="10.5">
      <!-- Critical -->
      <rect x="650" y="94" width="56" height="20" rx="4" fill="#f43f5e" opacity="0.2"/>
      <text x="678" y="108" text-anchor="middle" fill="#fb7185" font-weight="600">Critical</text>
      <text x="718" y="108" fill="#475569" font-family="'SF Mono','JetBrains Mono','Cascadia Code',monospace" font-size="9.5">(0)</text>
      <!-- Bar -->
      <rect x="748" y="97" width="110" height="14" rx="3" fill="#1e293b"/>
      <rect x="748" y="97" width="110" height="14" rx="3" fill="#f43f5e" opacity="0.35"/>
      <text x="862" y="108" fill="#fb7185" font-family="'SF Mono','JetBrains Mono','Cascadia Code',monospace" font-size="10" font-weight="600">2.0×</text>

      <!-- High -->
      <rect x="650" y="120" width="56" height="20" rx="4" fill="#f59e0b" opacity="0.2"/>
      <text x="678" y="134" text-anchor="middle" fill="#fbbf24" font-weight="600">High</text>
      <text x="718" y="134" fill="#475569" font-family="'SF Mono','JetBrains Mono','Cascadia Code',monospace" font-size="9.5">(1)</text>
      <rect x="748" y="123" width="110" height="14" rx="3" fill="#1e293b"/>
      <rect x="748" y="123" width="91" height="14" rx="3" fill="#f59e0b" opacity="0.3"/>
      <text x="862" y="134" fill="#fbbf24" font-family="'SF Mono','JetBrains Mono','Cascadia Code',monospace" font-size="10" font-weight="600">1.65×</text>

      <!-- Medium -->
      <rect x="650" y="146" width="56" height="20" rx="4" fill="#3b82f6" opacity="0.2"/>
      <text x="678" y="160" text-anchor="middle" fill="#60a5fa" font-weight="600">Medium</text>
      <text x="718" y="160" fill="#475569" font-family="'SF Mono','JetBrains Mono','Cascadia Code',monospace" font-size="9.5">(2)</text>
      <rect x="748" y="149" width="110" height="14" rx="3" fill="#1e293b"/>
      <rect x="748" y="149" width="72" height="14" rx="3" fill="#3b82f6" opacity="0.3"/>
      <text x="862" y="160" fill="#60a5fa" font-family="'SF Mono','JetBrains Mono','Cascadia Code',monospace" font-size="10" font-weight="600">1.30×</text>

      <!-- Low -->
      <rect x="650" y="172" width="56" height="20" rx="4" fill="#10b981" opacity="0.2"/>
      <text x="678" y="186" text-anchor="middle" fill="#34d399" font-weight="600">Low</text>
      <text x="718" y="186" fill="#475569" font-family="'SF Mono','JetBrains Mono','Cascadia Code',monospace" font-size="9.5">(3)</text>
      <rect x="748" y="175" width="110" height="14" rx="3" fill="#1e293b"/>
      <rect x="748" y="175" width="52" height="14" rx="3" fill="#10b981" opacity="0.3"/>
      <text x="862" y="186" fill="#34d399" font-family="'SF Mono','JetBrains Mono','Cascadia Code',monospace" font-size="10" font-weight="600">0.95×</text>

      <!-- Trivial -->
      <rect x="650" y="198" width="56" height="20" rx="4" fill="#475569" opacity="0.2"/>
      <text x="678" y="212" text-anchor="middle" fill="#64748b" font-weight="600">Trivial</text>
      <text x="718" y="212" fill="#475569" font-family="'SF Mono','JetBrains Mono','Cascadia Code',monospace" font-size="9.5">(4)</text>
      <rect x="748" y="201" width="110" height="14" rx="3" fill="#1e293b"/>
      <rect x="748" y="201" width="33" height="14" rx="3" fill="#475569" opacity="0.3"/>
      <text x="862" y="212" fill="#64748b" font-family="'SF Mono','JetBrains Mono','Cascadia Code',monospace" font-size="10" font-weight="600">0.60×</text>
    </g>
  </g>

  <!-- ═══════════ FORMULA BAR (bottom) ═══════════ -->
  <rect x="20" y="265" width="860" height="68" rx="8" fill="#0d1117" stroke="#1e293b" stroke-width="1"/>

  <g font-family="'SF Mono','JetBrains Mono','Cascadia Code',monospace" font-size="11">
    <!-- Line 1 -->
    <text x="40" y="288" fill="#475569">composite</text>
    <text x="120" y="288" fill="#64748b">=</text>
    <text x="133" y="288" fill="#475569">(</text>
    <text x="140" y="288" fill="#60a5fa">vector</text>
    <text x="186" y="288" fill="#64748b">× 0.45</text>
    <text x="232" y="288" fill="#475569">) + (</text>
    <text x="260" y="288" fill="#34d399">bm25</text>
    <text x="296" y="288" fill="#64748b">× 0.25</text>
    <text x="342" y="288" fill="#475569">) + (</text>
    <text x="370" y="288" fill="#fbbf24">recency</text>
    <text x="424" y="288" fill="#64748b">× 0.15</text>
    <text x="470" y="288" fill="#475569">) + (</text>
    <text x="498" y="288" fill="#fb7185">graph</text>
    <text x="540" y="288" fill="#64748b">× 0.15</text>
    <text x="586" y="288" fill="#475569">)</text>

    <!-- Line 2 -->
    <text x="40" y="318" fill="#e2e8f0" font-weight="600">final</text>
    <text x="82" y="318" fill="#94a3b8">=</text>
    <text x="95" y="318" fill="#94a3b8">composite</text>
    <text x="175" y="318" fill="#e2e8f0">×</text>
    <text x="190" y="318" fill="#e2e8f0" font-weight="600">importance_multiplier</text>
  </g>

  <!-- ═══════════ FOOTER ═══════════ -->
  <text x="450" y="345" text-anchor="middle" fill="#334155" font-family="'SF Pro Text','Inter','Segoe UI',system-ui,sans-serif" font-size="8">Engram Recall Scoring · Peter Simmons</text>
</svg>