<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 400" width="100%">
  <defs>
    <filter id="shadow-standard" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="3" dy="3" stdDeviation="0" flood-color="#2B2B2B" flood-opacity="0.15"/>
    </filter>
    <filter id="shadow-elevated" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="5" dy="5" stdDeviation="0" flood-color="#2B2B2B" flood-opacity="0.2"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8C8C8C"/>
    </marker>
    <style>
      @media (prefers-color-scheme: dark) {
        .bg-ivory { fill: #1A1A2E; }
        .text-navy { fill: #F5F0E8; }
        .text-charcoal { fill: #E0E0E0; }
        .card-fill { fill: #2B2B3D; }
      }
    </style>
  </defs>

  <!-- Background -->
  <rect class="bg-ivory" width="960" height="400" fill="#F5F0E8"/>

  <!-- Title Bar -->
  <rect x="0" y="0" width="960" height="44" fill="#1B3A5C"/>
  <text x="480" y="30" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="20" fill="#F5F0E8" text-anchor="middle" letter-spacing="0.05em">HOW RECALL WORKS — FOUR-LAYER SCORING</text>

  <!-- Query Input -->
  <g filter="url(#shadow-standard)">
    <rect class="card-fill" x="30" y="72" width="72" height="190" fill="#FFFFFF" stroke="#D4A843" stroke-width="2" rx="4"/>
    <text x="66" y="155" text-anchor="middle" fill="#1B3A5C" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="12" transform="rotate(-90 66 155)">QUERY</text>
    <text x="66" y="175" text-anchor="middle" fill="#8C8C8C" font-family="'Helvetica Neue', Arial, sans-serif" font-size="9" transform="rotate(-90 66 175)">recall()</text>
  </g>

  <!-- Flow arrows from query -->
  <g stroke="#8C8C8C" stroke-width="1" opacity="0.5">
    <line x1="102" y1="107" x2="118" y2="107"/>
    <line x1="102" y1="150" x2="118" y2="150"/>
    <line x1="102" y1="193" x2="118" y2="193"/>
    <line x1="102" y1="236" x2="118" y2="236"/>
  </g>

  <!-- Lane 1: Vector / Semantic (blue, 45%) -->
  <g filter="url(#shadow-standard)">
    <rect class="card-fill" x="120" y="86" width="360" height="40" fill="#FFFFFF" stroke="#4A7C9B" stroke-width="2" rx="4"/>
    <rect x="122" y="88" width="162" height="36" fill="#4A7C9B" opacity="0.1" rx="3"/>
    <text x="135" y="103" fill="#1B3A5C" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="12">Vector / Semantic</text>
    <text x="135" y="118" fill="#8C8C8C" font-family="'Helvetica Neue', Arial, sans-serif" font-size="9">Meaning similarity via embeddings</text>
    <rect x="418" y="94" width="50" height="24" fill="#4A7C9B" rx="2"/>
    <text x="443" y="110" text-anchor="middle" fill="#FFFFFF" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="700">45%</text>
  </g>

  <!-- Lane 2: BM25 / Keyword (green, 25%) -->
  <g filter="url(#shadow-standard)">
    <rect class="card-fill" x="120" y="130" width="360" height="40" fill="#FFFFFF" stroke="#2D6A4F" stroke-width="2" rx="4"/>
    <rect x="122" y="132" width="90" height="36" fill="#2D6A4F" opacity="0.1" rx="3"/>
    <text x="135" y="147" fill="#1B3A5C" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="12">BM25 / Keyword</text>
    <text x="135" y="162" fill="#8C8C8C" font-family="'Helvetica Neue', Arial, sans-serif" font-size="9">Exact term matching via FTS5</text>
    <rect x="418" y="138" width="50" height="24" fill="#2D6A4F" rx="2"/>
    <text x="443" y="154" text-anchor="middle" fill="#FFFFFF" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="700">25%</text>
  </g>

  <!-- Lane 3: Recency (gold, 15%) -->
  <g filter="url(#shadow-standard)">
    <rect class="card-fill" x="120" y="174" width="360" height="40" fill="#FFFFFF" stroke="#D4A843" stroke-width="2" rx="4"/>
    <rect x="122" y="176" width="54" height="36" fill="#D4A843" opacity="0.1" rx="3"/>
    <text x="135" y="191" fill="#1B3A5C" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="12">Recency</text>
    <text x="135" y="206" fill="#8C8C8C" font-family="'Helvetica Neue', Arial, sans-serif" font-size="9">Exponential decay from last access</text>
    <rect x="418" y="182" width="50" height="24" fill="#D4A843" rx="2"/>
    <text x="443" y="198" text-anchor="middle" fill="#FFFFFF" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="700">15%</text>
  </g>

  <!-- Lane 4: Graph (red, 15%) -->
  <g filter="url(#shadow-standard)">
    <rect class="card-fill" x="120" y="218" width="360" height="40" fill="#FFFFFF" stroke="#C23B22" stroke-width="2" rx="4"/>
    <rect x="122" y="220" width="54" height="36" fill="#C23B22" opacity="0.1" rx="3"/>
    <text x="135" y="235" fill="#1B3A5C" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="12">Graph</text>
    <text x="135" y="250" fill="#8C8C8C" font-family="'Helvetica Neue', Arial, sans-serif" font-size="9">Connected memory boost</text>
    <rect x="418" y="226" width="50" height="24" fill="#C23B22" rx="2"/>
    <text x="443" y="242" text-anchor="middle" fill="#FFFFFF" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="700">15%</text>
  </g>

  <!-- Merge arrows -->
  <g stroke="#8C8C8C" stroke-width="1" opacity="0.4">
    <path d="M480,106 L500,106 Q510,106 510,120 L510,160" fill="none"/>
    <path d="M480,150 L500,150 Q510,150 510,160" fill="none"/>
    <path d="M480,194 L500,194 Q510,194 510,175" fill="none"/>
    <path d="M480,238 L500,238 Q510,238 510,210 L510,175" fill="none"/>
  </g>

  <!-- Composite Score Box -->
  <g filter="url(#shadow-elevated)">
    <rect class="card-fill" x="500" y="72" width="130" height="190" fill="#FFFFFF" stroke="#1B3A5C" stroke-width="2" rx="4"/>
    <rect x="500" y="72" width="130" height="28" fill="#1B3A5C" rx="4"/>
    <rect x="500" y="96" width="130" height="4" fill="#1B3A5C"/>
    <text x="565" y="92" text-anchor="middle" fill="#F5F0E8" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="12">Composite</text>

    <g font-family="'Helvetica Neue', Arial, sans-serif" font-size="10">
      <text x="515" y="120" fill="#4A7C9B" font-weight="600">vec</text>
      <text x="540" y="120" fill="#8C8C8C">x 0.45</text>
      <text x="515" y="138" fill="#2D6A4F" font-weight="600">bm25</text>
      <text x="548" y="138" fill="#8C8C8C">x 0.25</text>
      <text x="515" y="156" fill="#D4A843" font-weight="600">rec</text>
      <text x="540" y="156" fill="#8C8C8C">x 0.15</text>
      <text x="515" y="174" fill="#C23B22" font-weight="600">grph</text>
      <text x="548" y="174" fill="#8C8C8C">x 0.15</text>
    </g>

    <line x1="512" y1="186" x2="618" y2="186" stroke="#8C8C8C" stroke-width="0.5" opacity="0.4"/>
    <text x="565" y="206" text-anchor="middle" fill="#8C8C8C" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10">x importance</text>
    <text x="565" y="224" text-anchor="middle" fill="#1B3A5C" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="11">= final score</text>
  </g>

  <!-- Arrow to importance -->
  <line x1="630" y1="167" x2="655" y2="167" stroke="#8C8C8C" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Importance Multiplier -->
  <g filter="url(#shadow-elevated)">
    <rect class="card-fill" x="660" y="72" width="270" height="190" fill="#FFFFFF" stroke="#1B3A5C" stroke-width="2" rx="4"/>
    <rect x="660" y="72" width="270" height="28" fill="#1B3A5C" rx="4"/>
    <rect x="660" y="96" width="270" height="4" fill="#1B3A5C"/>
    <text x="795" y="92" text-anchor="middle" fill="#F5F0E8" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="12">Importance Multiplier</text>

    <g font-family="'Helvetica Neue', Arial, sans-serif" font-size="11">
      <!-- Critical -->
      <rect x="676" y="108" width="58" height="20" fill="#C23B22" opacity="0.15" rx="2"/>
      <text x="705" y="122" text-anchor="middle" fill="#C23B22" font-weight="600">Critical</text>
      <text x="746" y="122" fill="#8C8C8C" font-size="9">(0)</text>
      <rect x="776" y="111" width="120" height="14" fill="#F5F0E8" stroke="#8C8C8C" stroke-width="0.5" rx="2"/>
      <rect x="776" y="111" width="120" height="14" fill="#C23B22" opacity="0.25" rx="2"/>
      <text x="900" y="122" fill="#C23B22" font-weight="700" font-size="10">2.0x</text>

      <!-- High -->
      <rect x="676" y="134" width="58" height="20" fill="#D4A843" opacity="0.15" rx="2"/>
      <text x="705" y="148" text-anchor="middle" fill="#D4A843" font-weight="600">High</text>
      <text x="746" y="148" fill="#8C8C8C" font-size="9">(1)</text>
      <rect x="776" y="137" width="120" height="14" fill="#F5F0E8" stroke="#8C8C8C" stroke-width="0.5" rx="2"/>
      <rect x="776" y="137" width="100" height="14" fill="#D4A843" opacity="0.2" rx="2"/>
      <text x="900" y="148" fill="#D4A843" font-weight="700" font-size="10">1.65x</text>

      <!-- Medium -->
      <rect x="676" y="160" width="58" height="20" fill="#4A7C9B" opacity="0.15" rx="2"/>
      <text x="705" y="174" text-anchor="middle" fill="#4A7C9B" font-weight="600">Medium</text>
      <text x="746" y="174" fill="#8C8C8C" font-size="9">(2)</text>
      <rect x="776" y="163" width="120" height="14" fill="#F5F0E8" stroke="#8C8C8C" stroke-width="0.5" rx="2"/>
      <rect x="776" y="163" width="78" height="14" fill="#4A7C9B" opacity="0.2" rx="2"/>
      <text x="900" y="174" fill="#4A7C9B" font-weight="700" font-size="10">1.30x</text>

      <!-- Low -->
      <rect x="676" y="186" width="58" height="20" fill="#2D6A4F" opacity="0.15" rx="2"/>
      <text x="705" y="200" text-anchor="middle" fill="#2D6A4F" font-weight="600">Low</text>
      <text x="746" y="200" fill="#8C8C8C" font-size="9">(3)</text>
      <rect x="776" y="189" width="120" height="14" fill="#F5F0E8" stroke="#8C8C8C" stroke-width="0.5" rx="2"/>
      <rect x="776" y="189" width="57" height="14" fill="#2D6A4F" opacity="0.2" rx="2"/>
      <text x="900" y="200" fill="#2D6A4F" font-weight="700" font-size="10">0.95x</text>

      <!-- Trivial -->
      <rect x="676" y="212" width="58" height="20" fill="#8C8C8C" opacity="0.15" rx="2"/>
      <text x="705" y="226" text-anchor="middle" fill="#8C8C8C" font-weight="600">Trivial</text>
      <text x="746" y="226" fill="#8C8C8C" font-size="9">(4)</text>
      <rect x="776" y="215" width="120" height="14" fill="#F5F0E8" stroke="#8C8C8C" stroke-width="0.5" rx="2"/>
      <rect x="776" y="215" width="36" height="14" fill="#8C8C8C" opacity="0.2" rx="2"/>
      <text x="900" y="226" fill="#8C8C8C" font-weight="700" font-size="10">0.60x</text>
    </g>
  </g>

  <!-- Formula Bar -->
  <g filter="url(#shadow-standard)">
    <rect class="card-fill" x="30" y="285" width="900" height="74" fill="#FFFFFF" stroke="#1B3A5C" stroke-width="2" rx="4"/>
    <rect x="30" y="285" width="900" height="24" fill="#1B3A5C" rx="4"/>
    <rect x="30" y="305" width="900" height="4" fill="#1B3A5C"/>
    <text x="480" y="302" text-anchor="middle" fill="#F5F0E8" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="600" font-size="10" letter-spacing="0.05em">SCORING FORMULA</text>

    <g font-family="'Helvetica Neue', Arial, sans-serif" font-size="11">
      <text x="50" y="330" fill="#8C8C8C">composite</text>
      <text x="125" y="330" fill="#2B2B2B">=</text>
      <text x="136" y="330" fill="#8C8C8C">(</text>
      <text x="142" y="330" fill="#4A7C9B" font-weight="600">vector</text>
      <text x="186" y="330" fill="#8C8C8C">x 0.45</text>
      <text x="234" y="330" fill="#8C8C8C">) + (</text>
      <text x="270" y="330" fill="#2D6A4F" font-weight="600">bm25</text>
      <text x="308" y="330" fill="#8C8C8C">x 0.25</text>
      <text x="356" y="330" fill="#8C8C8C">) + (</text>
      <text x="392" y="330" fill="#D4A843" font-weight="600">recency</text>
      <text x="446" y="330" fill="#8C8C8C">x 0.15</text>
      <text x="494" y="330" fill="#8C8C8C">) + (</text>
      <text x="530" y="330" fill="#C23B22" font-weight="600">graph</text>
      <text x="572" y="330" fill="#8C8C8C">x 0.15</text>
      <text x="620" y="330" fill="#8C8C8C">)</text>

      <text x="50" y="352" fill="#1B3A5C" font-weight="700">final</text>
      <text x="85" y="352" fill="#2B2B2B">=</text>
      <text x="96" y="352" fill="#8C8C8C">composite</text>
      <text x="170" y="352" fill="#1B3A5C" font-weight="700">x</text>
      <text x="185" y="352" fill="#1B3A5C" font-weight="700">importance_multiplier</text>
    </g>
  </g>

  <!-- Footer -->
  <text x="480" y="390" text-anchor="middle" fill="#8C8C8C" font-family="'Helvetica Neue', Arial, sans-serif" font-size="9" letter-spacing="0.08em">ENGRAM — RECALL SCORING — SIMMONS &amp; PARTNERS 2026</text>
</svg>
